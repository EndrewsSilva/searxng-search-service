# ==============================================================================
# SEARXNG - CONFIGURAÇÃO OTIMIZADA PARA BACKING GROUND CHECK / KYC
# ==============================================================================

use_default_settings: true

general:
  debug: false
  instance_name: "KYC Search Service"

server:
  secret_key: "kyc_secret_key_altere_em_producao"
  port: 8080
  bind_address: "0.0.0.0"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

# Cache Redis — evita re-bater nos motores para queries idênticas
redis:
  url: redis://searxng-redis:6379/0

outgoing:
  request_timeout: 6.0
  max_request_timeout: 12.0
  pool_connections: 100
  pool_maxsize: 20

# ==============================================================================
# ENGINES: apenas os que aguentam volume sem CAPTCHA
# ==============================================================================
engines:
  # Bing — mais tolerante a scraping automatizado, boa cobertura de sites BR
  - name: bing
    engine: bing
    shortcut: bi
    weight: 2.0
    disabled: false

  # DuckDuckGo full — melhor cobertura que o lite, sem CAPTCHA agressivo
  - name: duckduckgo
    engine: duckduckgo
    shortcut: dd
    weight: 1.5
    disabled: false

  # Google — DESABILITADO: CAPTCHA em menos de 5 queries rápidas da mesma IP
  - name: google
    engine: google
    shortcut: go
    disabled: true

  # Brave — DESABILITADO: rate limit muito agressivo (429 após poucas queries)
  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  # Startpage — DESABILITADO: replica os bloqueios do Google
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: true

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: true

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: true
